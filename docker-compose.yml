services:
  app:
    build: .
    container_name: notebook-zang-v2
    ports:
      - "8008:8008"
    volumes:
      - ./data:/app/data
      - ./notebooklm-487919-5e3793cd3866.json:/root/.config/gcloud/application_default_credentials.json:ro
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - default

  worker:
    build: .
    container_name: notebook-zang-worker
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./data:/app/data
      - ./notebooklm-487919-5e3793cd3866.json:/root/.config/gcloud/application_default_credentials.json:ro
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: notebook-zang-redis
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - default

volumes:
  redis_data:

networks:
  default:
    external:
      name: proxy-network
