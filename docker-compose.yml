services:
  app:
    build: .
    container_name: notebook-zang-v2
    ports:
      - "8008:8008"
    volumes:
      - ./data:/app/data
      - ./notebooklm-487919-5e3793cd3866.json:/root/.config/gcloud/application_default_credentials.json:ro
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    external:
      name: proxy-network
